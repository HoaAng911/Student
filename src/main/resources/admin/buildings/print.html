<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"/>
  <title>In danh sách toà nhà</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    @media print {
      .no-print { display: none !important; }
      body { font-size: 13px; }
    }
    body { padding: 20px; }
  </style>
</head>
<body>
  <div class="text-center mb-3">
    <h5 class="fw-bold">DANH SÁCH TOÀ NHÀ</h5>
    <p class="text-muted small mb-0"
       th:text="${keyword != null and !#strings.isEmpty(keyword)} ? 'Kết quả tìm kiếm: ' + ${keyword} : 'Tất cả toà nhà'"></p>
  </div>

  <table class="table table-bordered table-sm">
    <thead class="table-dark">
      <tr>
        <th>#</th>
        <th>Mã toà nhà</th>
        <th>Tên toà nhà</th>
        <th>Địa chỉ</th>
        <th>Mô tả</th>
        <th class="text-center">Trạng thái</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="b, stat : ${buildings}">
        <td th:text="${stat.count}"></td>
        <td th:text="${b.buildingCode}"></td>
        <td th:text="${b.buildingName}"></td>
        <td th:text="${b.address} ?: '-'"></td>
        <td th:text="${b.description} ?: '-'"></td>
        <td class="text-center">
          <span th:if="${b.isActive}">Hoạt động</span>
          <span th:unless="${b.isActive}">Tắt</span>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(buildings)}">
        <td colspan="6" class="text-center text-muted">Không có dữ liệu.</td>
      </tr>
    </tbody>
  </table>

  <div class="text-end text-muted small mt-2">
    Tổng: <strong th:text="${buildings.size()}"></strong> toà nhà
  </div>

  <div class="mt-3 no-print">
    <button class="btn btn-primary btn-sm" onclick="window.print()">
      In ngay
    </button>
    <a href="/admin/buildings" class="btn btn-outline-secondary btn-sm ms-2">Quay lại</a>
  </div>
  <script>
    window.addEventListener('load', () => window.print());
  </script>
</body>
</html>
