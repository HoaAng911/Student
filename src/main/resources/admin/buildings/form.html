<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout :: layoutPage(pageTitle=${isEdit} ? 'Cập nhật toà nhà' : 'Thêm toà nhà', content=~{:: content})}">
<body>
<th:block th:fragment="content">
  <div class="container-fluid">

    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/admin}">Trang quản trị</a></li>
        <li class="breadcrumb-item"><a th:href="@{/admin/buildings}">Toà nhà</a></li>
        <li class="breadcrumb-item active" th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'"></li>
      </ol>
    </nav>

    <div class="card shadow-sm border-0" style="max-width: 620px;">
      <div class="card-header bg-white py-3">
        <h5 class="mb-0 fw-semibold">
          <i class="bi bi-building me-2 text-primary"></i>
          <span th:text="${isEdit} ? 'Cập nhật toà nhà' : 'Thêm toà nhà'"></span>
        </h5>
      </div>
      <div class="card-body">
        <form th:action="@{/admin/buildings/save}" th:object="${building}" method="post" novalidate>
          <input type="hidden" th:field="*{id}" th:if="${isEdit}"/>
          <input type="hidden" name="isEdit" th:value="${isEdit}"/>

          <div class="mb-3">
            <label class="form-label fw-semibold">Mã toà nhà <span class="text-danger">*</span></label>
            <input type="text" th:field="*{buildingCode}"
                   th:class="'form-control' + (${#fields.hasErrors('buildingCode')} ? ' is-invalid' : '')"
                   maxlength="20" placeholder="VD: A1, B2"
                   th:readonly="${isEdit}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('buildingCode')}" th:errors="*{buildingCode}"></div>
            <div class="form-text" th:if="${isEdit}">Mã không thể thay đổi sau khi tạo.</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Tên toà nhà <span class="text-danger">*</span></label>
            <input type="text" th:field="*{buildingName}"
                   th:class="'form-control' + (${#fields.hasErrors('buildingName')} ? ' is-invalid' : '')"
                   maxlength="100" placeholder="VD: Toà nhà A"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('buildingName')}" th:errors="*{buildingName}"></div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Địa chỉ</label>
            <input type="text" th:field="*{address}"
                   th:class="'form-control' + (${#fields.hasErrors('address')} ? ' is-invalid' : '')"
                   maxlength="255" placeholder="Địa chỉ toà nhà"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Mô tả</label>
            <textarea th:field="*{description}"
                      th:class="'form-control' + (${#fields.hasErrors('description')} ? ' is-invalid' : '')"
                      maxlength="500" rows="2" placeholder="Mô tả ngắn về toà nhà..."></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
          </div>

          <div class="mb-4">
            <div class="form-check">
              <input type="checkbox" th:field="*{isActive}" class="form-check-input" id="isActive"/>
              <label class="form-check-label" for="isActive">Đang hoạt động</label>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-save me-1"></i>
              <span th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'"></span>
            </button>
            <a th:href="@{/admin/buildings}" class="btn btn-outline-secondary">
              <i class="bi bi-x-lg me-1"></i> Hủy
            </a>
          </div>
        </form>
      </div>
    </div>

  </div>
</th:block>
</body>
</html>
