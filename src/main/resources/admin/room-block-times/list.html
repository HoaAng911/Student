<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout :: layoutPage(pageTitle='Danh sách khóa/khoanh phòng', content=~{:: content})}">
<body>
<th:block th:fragment="content">
  <div class="container-fluid">

    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/admin}">Trang quản trị</a></li>
        <li class="breadcrumb-item active">Khóa/Khoanh phòng</li>
      </ol>
    </nav>

    <!-- Alerts -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
      <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
      <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-header bg-white py-3 d-flex flex-wrap align-items-center justify-content-between gap-2">
        <h5 class="mb-0 fw-semibold">
          <i class="bi bi-lock-fill me-2 text-primary"></i>Danh sách khóa/khoanh phòng
        </h5>
        <a th:href="@{/admin/room-block-times/add}" class="btn btn-primary btn-sm">
          <i class="bi bi-plus-lg me-1"></i> Thêm mới
        </a>
      </div>

      <div class="card-body">
        <!-- Search / Filter -->
        <form th:action="@{/admin/room-block-times}" method="get" class="row g-2 mb-3">
          <div class="col-12 col-md-3">
            <input type="text" name="keyword" th:value="${keyword}" class="form-control form-control-sm"
                   placeholder="Tìm theo lý do, phòng..."/>
          </div>
          <div class="col-12 col-md-2">
            <select name="roomId" class="form-select form-select-sm">
              <option value="">-- Phòng --</option>
              <option th:each="r : ${rooms}"
                      th:value="${r.id}"
                      th:selected="${roomId != null and roomId == r.id}"
                      th:text="${r.roomCode + ' - ' + r.roomName}"></option>
            </select>
          </div>
          <div class="col-12 col-md-2">
            <select name="blockType" class="form-select form-select-sm">
              <option value="">-- Loại khóa --</option>
              <option value="MAINTENANCE" th:selected="${blockType == 'MAINTENANCE'}">Bảo trì</option>
              <option value="EVENT" th:selected="${blockType == 'EVENT'}">Sự kiện</option>
              <option value="EXAM" th:selected="${blockType == 'EXAM'}">Thi cử</option>
              <option value="OTHER" th:selected="${blockType == 'OTHER'}">Lý do khác</option>
            </select>
          </div>
          <div class="col-12 col-md-2">
            <select name="status" class="form-select form-select-sm">
              <option value="">-- Trạng thái --</option>
              <option value="ACTIVE"   th:selected="${status == 'ACTIVE'}">Hoạt động</option>
              <option value="CANCELLED" th:selected="${status == 'CANCELLED'}">Đã hủy</option>
            </select>
          </div>
          <div class="col-auto">
            <button type="submit" class="btn btn-primary btn-sm">
              <i class="bi bi-search me-1"></i> Lọc
            </button>
          </div>
          <div class="col-auto">
            <a th:href="@{/admin/room-block-times}" class="btn btn-outline-secondary btn-sm">
              <i class="bi bi-arrow-counterclockwise me-1"></i> Làm mới
            </a>
          </div>
        </form>

        <!-- Table -->
        <div class="table-responsive">
          <table class="table table-hover table-bordered align-middle mb-0">
            <thead class="table-primary">
              <tr>
                <th class="text-center" style="width:50px;">#</th>
                <th>Phòng</th>
                <th>Loại khóa</th>
                <th>Tuần (Từ - Đến)</th>
                <th>Ngày (Từ - Đến)</th>
                <th>Thứ</th>
                <th>Lý do</th>
                <th class="text-center">Trạng thái</th>
                <th class="text-center" style="width:120px;">Thao tác</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${#lists.isEmpty(timePage.content)}">
                <td colspan="9" class="text-center text-muted py-4">
                  <i class="bi bi-inbox fs-4 d-block mb-2"></i>Chưa có dữ liệu.
                </td>
              </tr>
              <tr th:each="o, stat : ${timePage.content}">
                <td class="text-center text-muted" th:text="${currentPage * 10 + stat.count}"></td>
                <td th:text="${o.roomName ?: ''}"></td>
                <td>
                  <span class="badge" th:classappend="${o.blockType == 'MAINTENANCE' ? 'bg-warning-subtle text-warning' : o.blockType == 'EVENT' ? 'bg-primary-subtle text-primary' : o.blockType == 'EXAM' ? 'bg-danger-subtle text-danger' : 'bg-info-subtle text-info'}"
                        th:text="${o.blockType == 'MAINTENANCE' ? 'Bảo trì' : o.blockType == 'EVENT' ? 'Sự kiện' : o.blockType == 'EXAM' ? 'Thi cử' : 'Khác'}"></span>
                </td>
                <td th:text="${(o.startWeek != null ? 'T' + o.startWeek : '?') + ' - ' + (o.endWeek != null ? 'T' + o.endWeek : '?')}"></td>
                <td th:text="${(o.startDate != null ? #temporals.format(o.startDate, 'dd/MM/yyyy') : '?') + ' - ' + (o.endDate != null ? #temporals.format(o.endDate, 'dd/MM/yyyy') : '?')}"></td>
                <td th:text="${o.dayOfWeek != null ? o.dayOfWeek : '-'}"></td>
                <td class="text-muted" style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"
                    th:text="${o.reason} ?: '-'" th:title="${o.reason}"></td>
                <td class="text-center">
                  <span class="badge"
                        th:classappend="${o.status == 'ACTIVE' ? 'bg-success-subtle text-success' : 'bg-secondary-subtle text-secondary'}"
                        th:text="${o.status == 'ACTIVE' ? 'Hoạt động' : 'Đã hủy'}">
                  </span>
                </td>
                <td class="text-center">
                  <a th:href="@{/admin/room-block-times/edit/{id}(id=${o.blockId})}"
                     class="btn btn-sm btn-outline-primary me-1">
                    <i class="bi bi-pencil"></i>
                  </a>
                  <form th:action="@{/admin/room-block-times/delete/{id}(id=${o.blockId})}" method="post" class="d-inline"
                        onsubmit="return confirm('Bạn có chắc muốn xóa bản ghi khóa phòng này?');">
                    <button type="submit" class="btn btn-sm btn-outline-danger">
                      <i class="bi bi-trash"></i>
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="d-flex justify-content-between align-items-center mt-3" th:if="${timePage.totalElements > 0}">
          <small class="text-muted">
            Tổng <strong th:text="${timePage.totalElements}"></strong> bản ghi
            | Trang <strong th:text="${currentPage + 1}"></strong> / <strong th:text="${totalPages}"></strong>
          </small>
          <nav th:if="${totalPages > 1}">
            <ul class="pagination pagination-sm mb-0">
              <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/room-block-times(keyword=${keyword}, roomId=${roomId}, status=${status}, blockType=${blockType}, page=${currentPage - 1}, size=10)}">
                  <i class="bi bi-chevron-left"></i>
                </a>
              </li>
              <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                  class="page-item" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/admin/room-block-times(keyword=${keyword}, roomId=${roomId}, status=${status}, blockType=${blockType}, page=${i}, size=10)}"
                   th:text="${i + 1}"></a>
              </li>
              <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/room-block-times(keyword=${keyword}, roomId=${roomId}, status=${status}, blockType=${blockType}, page=${currentPage + 1}, size=10)}">
                  <i class="bi bi-chevron-right"></i>
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </div>

  </div>
</th:block>
</body>
</html>
