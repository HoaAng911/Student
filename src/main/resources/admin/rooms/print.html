<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"/>
  <title>In danh sách phòng học</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    @media print {
      .no-print { display: none !important; }
      body { font-size: 13px; }
    }
    body { padding: 20px; }
  </style>
</head>
<body>
  <div class="text-center mb-3">
    <h5 class="fw-bold">DANH SÁCH PHÒNG HỌC</h5>
    <p class="text-muted small mb-0"
       th:text="${keyword != null and !#strings.isEmpty(keyword)} ? 'Kết quả tìm kiếm: ' + ${keyword} : 'Tất cả phòng học'"></p>
  </div>

  <table class="table table-bordered table-sm">
    <thead class="table-dark">
      <tr>
        <th>#</th>
        <th>Mã phòng</th>
        <th>Tên phòng</th>
        <th>Tòa nhà</th>
        <th>Loại phòng</th>
        <th class="text-center">Tầng</th>
        <th class="text-center">Sức chứa</th>
        <th class="text-center">Diện tích</th>
        <th>Trạng thái</th>
        <th class="text-center">HĐ</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="r, stat : ${rooms}">
        <td th:text="${stat.count}"></td>
        <td th:text="${r.roomCode}"></td>
        <td th:text="${r.roomName}"></td>
        <td th:text="${r.buildingName} ?: '-'"></td>
        <td th:text="${r.roomTypeName} ?: '-'"></td>
        <td class="text-center" th:text="${r.floor}"></td>
        <td class="text-center" th:text="${r.capacity}"></td>
        <td class="text-center" th:text="${r.area}"></td>
        <td th:text="${r.status} ?: '-'"></td>
        <td class="text-center" th:text="${r.isActive} ? 'Đang dùng' : 'Ngưng'"></td>
      </tr>
      <tr th:if="${#lists.isEmpty(rooms)}">
        <td colspan="10" class="text-center text-muted">Không có dữ liệu.</td>
      </tr>
    </tbody>
  </table>

  <div class="text-end text-muted small mt-2">
    Tổng: <strong th:text="${rooms.size()}"></strong> phòng
  </div>

  <div class="mt-3 no-print">
    <button class="btn btn-primary btn-sm" onclick="window.print()">
      In ngay
    </button>
    <a href="/admin/rooms" class="btn btn-outline-secondary btn-sm ms-2">Quay lại</a>
  </div>
  <script>
    window.addEventListener('load', () => window.print());
  </script>
</body>
</html>
