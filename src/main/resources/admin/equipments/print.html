<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"/>
  <title>In danh sách thiết bị</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    @media print {
      .no-print { display: none !important; }
      body { font-size: 13px; }
    }
    body { padding: 20px; }
  </style>
</head>
<body>
  <div class="text-center mb-3">
    <h5 class="fw-bold">DANH SÁCH THIẾT BỊ</h5>
    <p class="text-muted small mb-0"
       th:text="${keyword != null and !#strings.isEmpty(keyword)} ? 'Kết quả tìm kiếm: ' + ${keyword} : 'Tất cả thiết bị'"></p>
  </div>

  <table class="table table-bordered table-sm">
    <thead class="table-dark">
      <tr>
        <th>#</th>
        <th>Mã thiết bị</th>
        <th>Tên thiết bị</th>
        <th>Số serial</th>
        <th class="text-center">Ngày mua</th>
        <th class="text-center">Trạng thái</th>
        <th>Phòng sử dụng</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="e, stat : ${equipments}">
        <td th:text="${stat.count}"></td>
        <td th:text="${e.equipmentCode}"></td>
        <td th:text="${e.equipmentName}"></td>
        <td th:text="${e.serialNumber} ?: '-'"></td>
        <td class="text-center" th:text="${e.purchaseDate} ?: '-'"></td>
        <td class="text-center">
          <span th:if="${e.status == 'ACTIVE'}">Đang hoạt động</span>
          <span th:if="${e.status == 'BROKEN'}">Hỏng</span>
          <span th:if="${e.status == 'MAINTENANCE'}">Bảo trì</span>
          <span th:if="${e.status == null or e.status == ''}">Chưa xác định</span>
        </td>
        <td th:text="${e.roomName} ?: '-'"></td>
      </tr>
      <tr th:if="${#lists.isEmpty(equipments)}">
        <td colspan="7" class="text-center text-muted">Không có dữ liệu.</td>
      </tr>
    </tbody>
  </table>

  <div class="text-end text-muted small mt-2">
    Tổng: <strong th:text="${equipments.size()}"></strong> thiết bị
  </div>

  <div class="mt-3 no-print">
    <button class="btn btn-primary btn-sm" onclick="window.print()">In ngay</button>
    <a href="/admin/equipments" class="btn btn-outline-secondary btn-sm ms-2">Quay lại</a>
  </div>
  <script>
    window.addEventListener('load', () => window.print());
  </script>
</body>
</html>
