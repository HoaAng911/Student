<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lỗi – Quản lý lịch học</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0f1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 60%);
      z-index: 0;
    }
    .error-container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 480px;
      padding: 40px;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .error-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 12px;
    }
    .error-message {
      color: #64748b;
      font-size: .95rem;
      line-height: 1.7;
      margin-bottom: 36px;
    }
    .error-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn-error {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 12px;
      font-weight: 600;
      font-size: .9rem;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-error-primary {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      border: none;
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.25);
    }
    .btn-error-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(59, 130, 246, 0.35);
      color: #fff;
    }
    .btn-error-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #94a3b8;
    }
    .btn-error-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
    }
    .pulse-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 300px; height: 300px;
      border-radius: 50%;
      border: 1px solid rgba(59, 130, 246, 0.1);
      animation: pulse 3s ease-in-out infinite;
      z-index: -1;
    }
    .pulse-ring:nth-child(2) { width: 450px; height: 450px; animation-delay: 1s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); }
    }
  </style>
</head>
<body>
<div class="error-container">
  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>
  <div class="error-code" th:text="${status}">500</div>
  <h2 class="error-title" th:text="${error} ?: 'Đã xảy ra lỗi'">Lỗi máy chủ</h2>
  <p class="error-message"
     th:text="${message != null and !#strings.isEmpty(message)} ? ${message} : 'Rất tiếc, đã có lỗi xảy ra. Vui lòng thử lại hoặc quay về trang chủ.'">
  </p>
  <div class="error-actions">
    <a href="/" class="btn-error btn-error-primary">
      <i class="bi bi-house"></i> Trang chủ
    </a>
    <a href="/admin" class="btn-error btn-error-secondary">
      <i class="bi bi-grid"></i> Quản trị
    </a>
  </div>
</div>
</body>
</html>
