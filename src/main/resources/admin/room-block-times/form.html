<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout :: layoutPage(pageTitle=${isEdit} ? 'Cập nhật khóa phòng' : 'Thêm khóa phòng', content=~{:: content})}">
<body>
<th:block th:fragment="content">
  <div class="container-fluid">

    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/admin}">Trang quản trị</a></li>
        <li class="breadcrumb-item"><a th:href="@{/admin/room-block-times}">Khóa/Khoanh phòng</a></li>
        <li class="breadcrumb-item active" th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'"></li>
      </ol>
    </nav>

    <div class="card shadow-sm border-0" style="max-width: 780px;">
      <div class="card-header bg-white py-3">
        <h5 class="mb-0 fw-semibold">
          <i class="bi bi-lock-fill me-2 text-primary"></i>
          <span th:text="${isEdit} ? 'Cập nhật khóa phòng' : 'Thêm khóa phòng'"></span>
        </h5>
      </div>
      <div class="card-body">
        <form th:action="@{/admin/room-block-times/save}" th:object="${blockTime}" method="post" novalidate>
          <input type="hidden" th:field="*{blockId}" th:if="${isEdit}" />
          <input type="hidden" name="isEdit" th:value="${isEdit}" />

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Phòng <span class="text-danger">*</span></label>
              <select th:field="*{roomId}" th:class="'form-select' + (${#fields.hasErrors('roomId')} ? ' is-invalid' : '')" required>
                <option value="" disabled selected>-- Chọn phòng --</option>
                <option th:each="r : ${rooms}" th:value="${r.id}" th:text="${r.roomCode + ' - ' + r.roomName}"></option>
              </select>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('roomId')}" th:errors="*{roomId}"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Loại khóa <span class="text-danger">*</span></label>
              <select th:field="*{blockType}" th:class="'form-select' + (${#fields.hasErrors('blockType')} ? ' is-invalid' : '')" required>
                <option value="MAINTENANCE">Bảo trì</option>
                <option value="EVENT">Sự kiện</option>
                <option value="EXAM">Thi cử</option>
                <option value="OTHER">Lý do khác</option>
              </select>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('blockType')}" th:errors="*{blockType}"></div>
            </div>
          </div>

          <div class="row g-3 mt-1">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Ngày bắt đầu</label>
              <input type="date" th:field="*{startDate}" th:class="'form-control' + (${#fields.hasErrors('startDate')} ? ' is-invalid' : '')" />
              <div class="invalid-feedback" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Ngày kết thúc</label>
              <input type="date" th:field="*{endDate}" th:class="'form-control' + (${#fields.hasErrors('endDate')} ? ' is-invalid' : '')" />
              <div class="invalid-feedback" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></div>
            </div>
          </div>

          <div class="row g-3 mt-1">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Tuần bắt đầu</label>
              <input type="number" th:field="*{startWeek}" class="form-control" placeholder="Ví dụ: 1" min="1" max="52"/>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Tuần kết thúc</label>
              <input type="number" th:field="*{endWeek}" class="form-control" placeholder="Ví dụ: 15" min="1" max="52"/>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Thứ (2-8)</label>
              <select th:field="*{dayOfWeek}" class="form-select">
                <option value="">-- Chọn thứ --</option>
                <option value="2">Thứ 2</option>
                <option value="3">Thứ 3</option>
                <option value="4">Thứ 4</option>
                <option value="5">Thứ 5</option>
                <option value="6">Thứ 6</option>
                <option value="7">Thứ 7</option>
                <option value="8">Chủ nhật</option>
              </select>
            </div>
          </div>

          <div class="row g-3 mt-1">
            <div class="col-md-8">
              <label class="form-label fw-semibold">Lý do</label>
              <textarea th:field="*{reason}" class="form-control" rows="3" maxlength="255" placeholder="Ghi chú lý do khóa phòng..."></textarea>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Trạng thái</label>
              <select th:field="*{status}" class="form-select">
                <option value="ACTIVE">Hoạt động</option>
                <option value="CANCELLED">Đã hủy</option>
              </select>
            </div>
          </div>

          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-save me-1"></i>
              <span th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'"></span>
            </button>
            <a th:href="@{/admin/room-block-times}" class="btn btn-outline-secondary">
              <i class="bi bi-x-lg me-1"></i> Hủy
            </a>
          </div>
        </form>
      </div>
    </div>

  </div>
</th:block>
</body>
</html>
