<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"/>
  <title>In danh sách loại phòng học</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    @media print {
      .no-print { display: none !important; }
      body { font-size: 13px; }
    }
    body { padding: 20px; }
  </style>
</head>
<body>
  <div class="text-center mb-3">
    <h5 class="fw-bold">DANH SÁCH LOẠI PHÒNG HỌC</h5>
    <p class="text-muted small mb-0"
       th:text="${keyword != null and !#strings.isEmpty(keyword)} ? 'Kết quả tìm kiếm: ' + ${keyword} : 'Tất cả loại phòng'"></p>
  </div>

  <table class="table table-bordered table-sm">
    <thead class="table-dark">
      <tr>
        <th>#</th>
        <th>Mã loại phòng</th>
        <th>Tên loại phòng</th>
        <th>Mô tả</th>
        <th class="text-center">Sức chứa tối đa</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="rt, stat : ${roomTypes}">
        <td th:text="${stat.count}"></td>
        <td th:text="${rt.roomTypeCode}"></td>
        <td th:text="${rt.roomTypeName}"></td>
        <td th:text="${rt.description} ?: '-'"></td>
        <td class="text-center" th:text="${rt.maxCapacity != null} ? ${rt.maxCapacity} : '-'"></td>
      </tr>
      <tr th:if="${#lists.isEmpty(roomTypes)}">
        <td colspan="5" class="text-center text-muted">Không có dữ liệu.</td>
      </tr>
    </tbody>
  </table>

  <div class="text-end text-muted small mt-2">
    Tổng: <strong th:text="${roomTypes.size()}"></strong> loại phòng
  </div>

  <div class="mt-3 no-print">
    <button class="btn btn-primary btn-sm" onclick="window.print()">
      In ngay
    </button>
    <a href="/admin/room-types" class="btn btn-outline-secondary btn-sm ms-2">Quay lại</a>
  </div>
  <script>
    window.addEventListener('load', () => window.print());
  </script>
</body>
</html>
