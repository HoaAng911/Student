<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Hệ thống Quản lý Đào tạo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        p.subtitle {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
            color: white;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            text-align: center;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .test-info {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
        }
        .test-info h4 { 
            font-size: 0.8rem; 
            color: #94a3b8; 
            margin-bottom: 1rem; 
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .test-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 0.75rem; 
            font-size: 0.75rem;
        }
        .test-item { 
            background: rgba(0,0,0,0.2); 
            padding: 0.75rem; 
            border-radius: 0.75rem; 
            border: 1px solid var(--glass-border);
            transition: all 0.3s;
        }
        .test-item:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }
        .test-item strong { 
            color: var(--primary); 
            display: block; 
            margin-bottom: 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        .test-item span {
            color: #e2e8f0;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Chào mừng trở lại</h2>
        <p class="subtitle">Đăng nhập để quản lý học tập</p>

        <div th:if="${error}" class="error-msg" th:text="${error}"></div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" name="username" placeholder="Nhập username..." required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Đăng nhập</button>
        </form>

        <div class="test-info">
            <h4>Tài khoản dùng thử</h4>
            <div class="test-grid">
                <div class="test-item">
                    <strong>Quản trị viên</strong>
                    <span>admin / admin123</span>
                </div>
                <div class="test-item">
                    <strong>Giảng viên</strong>
                    <span>teacher / teacher123</span>
                </div>
                <div class="test-item">
                    <strong>Sinh viên</strong>
                    <span>21001004 / 123</span>
                </div>
                <div class="test-item">
                    <strong>SV Mẫu</strong>
                    <span>student / student123</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
