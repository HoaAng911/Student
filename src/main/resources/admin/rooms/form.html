<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout :: layoutPage(pageTitle=${isEdit} ? 'Cập nhật phòng học' : 'Thêm phòng học', content=~{:: content})}">
<body>
<th:block th:fragment="content">
  <div class="container-fluid">

    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/admin}">Trang quản trị</a></li>
        <li class="breadcrumb-item"><a th:href="@{/admin/rooms}">Phòng học</a></li>
        <li class="breadcrumb-item active" th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'"></li>
      </ol>
    </nav>

    <div class="card shadow-sm border-0" style="max-width: 720px;">
      <div class="card-header bg-white py-3">
        <h5 class="mb-0 fw-semibold">
          <i class="bi bi-door-open-fill me-2 text-primary"></i>
          <span th:text="${isEdit} ? 'Cập nhật phòng học' : 'Thêm phòng học'"></span>
        </h5>
      </div>
      <div class="card-body">
        <form th:action="@{/admin/rooms/save}" th:object="${room}" method="post" novalidate>
          <input type="hidden" th:field="*{id}" th:if="${isEdit}"/>
          <input type="hidden" name="isEdit" th:value="${isEdit}"/>

          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Mã phòng <span class="text-danger">*</span></label>
              <input type="text" th:field="*{roomCode}"
                     th:class="'form-control' + (${#fields.hasErrors('roomCode')} ? ' is-invalid' : '')"
                     maxlength="20" placeholder="VD: P101"
                     th:readonly="${isEdit}"/>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('roomCode')}" th:errors="*{roomCode}"></div>
              <div class="form-text" th:if="${isEdit}">Mã không thể thay đổi sau khi tạo.</div>
            </div>
            <div class="col-md-8">
              <label class="form-label fw-semibold">Tên phòng <span class="text-danger">*</span></label>
              <input type="text" th:field="*{roomName}"
                     th:class="'form-control' + (${#fields.hasErrors('roomName')} ? ' is-invalid' : '')"
                     maxlength="100" placeholder="VD: Phòng học 101"/>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('roomName')}" th:errors="*{roomName}"></div>
            </div>
          </div>

          <div class="row g-3 mt-1">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Tòa nhà <span class="text-danger">*</span></label>
              <select th:field="*{buildingId}"
                      th:class="'form-select' + (${#fields.hasErrors('buildingId')} ? ' is-invalid' : '')">
                <option value="" disabled>-- Chọn tòa nhà --</option>
                <option th:each="b : ${buildings}"
                        th:value="${b.id}"
                        th:text="${b.buildingCode + ' - ' + b.buildingName}"></option>
              </select>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('buildingId')}" th:errors="*{buildingId}"></div>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Loại phòng <span class="text-danger">*</span></label>
              <select th:field="*{roomTypeId}"
                      th:class="'form-select' + (${#fields.hasErrors('roomTypeId')} ? ' is-invalid' : '')">
                <option value="" disabled>-- Chọn loại phòng --</option>
                <option th:each="rt : ${roomTypes}"
                        th:value="${rt.roomTypeId}"
                        th:text="${rt.roomTypeName}"></option>
              </select>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('roomTypeId')}" th:errors="*{roomTypeId}"></div>
            </div>
            <div class="col-md-2">
              <label class="form-label fw-semibold">Tầng</label>
              <input type="number" th:field="*{floor}"
                     th:class="'form-control' + (${#fields.hasErrors('floor')} ? ' is-invalid' : '')"
                     min="-10" max="200" placeholder="VD: 1"/>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('floor')}" th:errors="*{floor}"></div>
            </div>
            <div class="col-md-2">
              <label class="form-label fw-semibold">Sức chứa</label>
              <input type="number" th:field="*{capacity}"
                     th:class="'form-control' + (${#fields.hasErrors('capacity')} ? ' is-invalid' : '')"
                     min="0" max="9999" placeholder="VD: 50"/>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></div>
            </div>
          </div>

          <div class="row g-3 mt-1">
            <div class="col-md-3">
              <label class="form-label fw-semibold">Diện tích (m²)</label>
              <input type="number" step="0.1" th:field="*{area}"
                     th:class="'form-control' + (${#fields.hasErrors('area')} ? ' is-invalid' : '')"
                     min="0" placeholder="VD: 45.5"/>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('area')}" th:errors="*{area}"></div>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Trạng thái</label>
              <select th:field="*{status}"
                      th:class="'form-select' + (${#fields.hasErrors('status')} ? ' is-invalid' : '')">
                <option value="">-- Chọn trạng thái --</option>
                <option value="AVAILABLE">Sẵn dùng</option>
                <option value="IN_USE">Đang sử dụng</option>
                <option value="MAINTENANCE">Bảo trì</option>
              </select>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
            </div>
            <div class="col-md-3 d-flex align-items-end">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" th:field="*{isActive}" id="isActiveCheck"/>
                <label class="form-check-label fw-semibold" for="isActiveCheck">
                  Đang hoạt động
                </label>
              </div>
            </div>
          </div>

          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-save me-1"></i>
              <span th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'"></span>
            </button>
            <a th:href="@{/admin/rooms}" class="btn btn-outline-secondary">
              <i class="bi bi-x-lg me-1"></i> Hủy
            </a>
          </div>
        </form>
      </div>
    </div>

  </div>
</th:block>
</body>
</html>
