<html xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout/layout :: layoutPage(pageTitle=${title}, content=~{:: content})}">

<body>
  <th:block th:fragment="content">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="d-flex align-items-center mb-4">
                    <a href="/api/grade-scales" class="btn btn-light border rounded-circle me-3 shadow-sm">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <div>
                        <h2 class="fw-bold text-dark mb-1" th:text="${title}">Thang điểm</h2>
                        <p class="text-muted small mb-0">Nhập các thông số kỹ thuật cho thang điểm quy đổi.</p>
                    </div>
                </div>

                <div class="card border-0 shadow-sm" style="border-radius: 20px;">
                    <div class="card-body p-4 p-md-5">
                        <form id="gradeScaleForm" th:object="${gradeScale}">
                            <input type="hidden" th:field="*{id}" id="gradeScaleId">
                            
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small text-muted text-uppercase">Mã thang điểm</label>
                                    <input type="text" class="form-control form-control-lg bg-light border-0" 
                                           th:field="*{scaleCode}" placeholder="VD: A, B+, C..." required style="border-radius: 12px;">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small text-muted text-uppercase">Điểm chữ tương ứng</label>
                                    <input type="text" class="form-control form-control-lg bg-light border-0" 
                                           th:field="*{letterGrade}" placeholder="VD: A, B..." required style="border-radius: 12px;">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold small text-muted text-uppercase">Cận dưới (Điểm hệ 10)</label>
                                    <input type="number" step="0.01" class="form-control form-control-lg bg-light border-0" 
                                           th:field="*{minScore}" placeholder="0.00" required style="border-radius: 12px;">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small text-muted text-uppercase">Cận trên (Điểm hệ 10)</label>
                                    <input type="number" step="0.01" class="form-control form-control-lg bg-light border-0" 
                                           th:field="*{maxScore}" placeholder="10.00" required style="border-radius: 12px;">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold small text-muted text-uppercase">Giá trị GPA (Hệ 4)</label>
                                    <input type="number" step="0.01" class="form-control form-control-lg bg-light border-0" 
                                           th:field="*{gpaValue}" placeholder="4.0" required style="border-radius: 12px;">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small text-muted text-uppercase d-block mb-3">Tùy chọn trạng thái</label>
                                    <div class="d-flex gap-4">
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" th:field="*{isPass}" id="isPassSwitch">
                                            <label class="form-check-label fw-semibold" for="isPassSwitch">Tính là đạt (Pass)</label>
                                        </div>
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" th:field="*{isActive}" id="isActiveSwitch">
                                            <label class="form-check-label fw-semibold" for="isActiveSwitch">Kích hoạt</label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-5 pt-4 border-top">
                                <div class="d-flex justify-content-end gap-3">
                                    <a href="/api/grade-scales" class="btn btn-light px-4 py-2 border fw-semibold" style="border-radius: 10px;">Hủy bỏ</a>
                                    <button type="submit" class="btn btn-primary px-5 py-2 fw-bold shadow-sm" style="border-radius: 10px;">
                                        <i class="bi bi-save me-2"></i>Lưu cấu hình
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('gradeScaleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            
            data.isPass = document.getElementById('isPassSwitch').checked;
            data.isActive = document.getElementById('isActiveSwitch').checked;
            
            if (!data.id) delete data.id;

            fetch('/api/v1/grade-scales', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            }).then(response => {
                if (response.ok) {
                    alert('Lưu thành công!');
                    window.location.href = '/api/grade-scales';
                } else {
                    response.text().then(text => alert('Lỗi: ' + text));
                }
            }).catch(err => {
                console.error(err);
                alert('Có lỗi xảy ra, vui lòng thử lại.');
            });
        });
    </script>
  </th:block>
</body>
</html>
