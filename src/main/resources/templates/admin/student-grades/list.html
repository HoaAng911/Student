<html xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout/layout :: layoutPage(pageTitle='Danh sách điểm sinh viên', content=~{:: content})}">

<body>
  <th:block th:fragment="content">
    <div class="container-fluid">
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item"><a th:href="@{/api}" class="text-decoration-none">Trang quản trị</a></li>
          <li class="breadcrumb-item active">Điểm sinh viên</li>
        </ol>
      </nav>

      <div th:if="${success ?: param.success}" class="alert alert-success border-0 shadow-sm d-flex align-items-center mb-4" role="alert">
        <i class="bi bi-check-circle-fill fs-5 me-3"></i>
        <div th:text="${success ?: param.success}"></div>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
      </div>

      <div class="card border-0">
        <div class="card-header d-flex align-items-center justify-content-between">
          <div>
            <h5 class="mb-1 fw-bold text-dark">Danh sách điểm sinh viên</h5>
            <p class="text-muted small mb-0">Quản lý và cập nhật kết quả học tập của sinh viên</p>
          </div>
          <a th:href="@{/api/student-grades/add}" class="btn btn-primary px-4 py-2 rounded-pill shadow-sm transition-all">
            <i class="bi bi-plus-lg me-2"></i>Thêm mới
          </a>
        </div>

        <div class="card-body p-0">
          <div class="p-4 bg-light-subtle border-bottom">
            <form th:action="@{/api/student-grades}" method="get" class="row g-3">
              <div class="col-12 col-md-4">
                <div class="input-group">
                  <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-search"></i></span>
                  <input type="text" name="keyword" th:value="${keyword}" class="form-control border-start-0"
                    placeholder="Tìm theo ghi chú..." />
                </div>
              </div>
              <div class="col-auto">
                <button type="submit" class="btn btn-dark px-4">Lọc</button>
              </div>
              <div class="col-auto">
                <a th:href="@{/api/student-grades}" class="btn btn-outline-secondary px-3">
                  <i class="bi bi-arrow-counterclockwise"></i>
                </a>
              </div>
            </form>
          </div>

          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead>
                <tr>
                  <th class="text-center" style="width: 60px;">#</th>
                  <th>Thành phần điểm</th>
                  <th class="text-center">Điểm</th>
                  <th class="text-center">Thi lại</th>
                  <th class="text-center">Khóa</th>
                  <th>Ghi chú</th>
                  <th class="text-center">Trạng thái</th>
                  <th class="text-center" style="width: 140px;">Thao tác</th>
                </tr>
              </thead>
              <tbody>
                <tr th:if="${#lists.isEmpty(studentGrades)}">
                  <td colspan="8" class="text-center py-5">
                    <div class="py-4">
                      <i class="bi bi-inbox fs-1 text-muted d-block mb-3"></i>
                      <p class="text-muted mb-0">Chưa có dữ liệu điểm nào trong hệ thống.</p>
                    </div>
                  </td>
                </tr>
                <tr th:each="grade, stat : ${studentGrades}" th:id="'row-' + ${grade.id}" class="transition-all">
                  <td class="text-center text-muted font-monospace" th:text="${stat.count}"></td>
                  <td>
                    <th:block th:each="gc : ${gradeComponents}" th:if="${gc.id == grade.gradeComponentId}">
                      <div class="fw-semibold text-dark" th:text="${gc.componentName}"></div>
                      <div class="small text-muted" th:text="${gc.componentCode}"></div>
                    </th:block>
                    <span th:if="${grade.gradeComponentId == null}" class="badge bg-light text-muted fw-normal">Chưa gán</span>
                  </td>
                  <td class="text-center">
                    <div class="fs-5 fw-bold text-primary" th:text="${grade.score}">8.5</div>
                  </td>
                  <td class="text-center">
                    <span th:if="${grade.isRetake}" class="badge rounded-pill bg-warning-subtle text-warning border border-warning-subtle px-3">Có</span>
                    <span th:unless="${grade.isRetake}" class="badge rounded-pill bg-light text-muted px-3">Không</span>
                  </td>
                  <td class="text-center">
                    <div class="form-check form-switch d-inline-block">
                      <input class="form-check-input" type="checkbox" th:checked="${grade.isLocked}" disabled>
                    </div>
                  </td>
                  <td class="text-muted small" th:text="${grade.note}"></td>
                  <td class="text-center">
                    <span th:if="${grade.isActive}" class="badge rounded-pill bg-success-subtle text-success border border-success-subtle px-3">Hoạt động</span>
                    <span th:unless="${grade.isActive}" class="badge rounded-pill bg-danger-subtle text-danger border border-danger-subtle px-3">Ẩn</span>
                  </td>
                  <td class="text-center">
                    <div class="d-flex justify-content-center gap-2">
                      <a th:href="@{/api/student-grades/edit/{id}(id=${grade.id})}"
                        class="btn btn-sm btn-outline-primary border-0 rounded-circle p-2" title="Chỉnh sửa">
                        <i class="bi bi-pencil-square fs-5"></i>
                      </a>
                      <button type="button"
                        class="btn btn-sm btn-outline-danger border-0 rounded-circle p-2" 
                        th:data-id="${grade.id}" onclick="deleteGrade(this.getAttribute('data-id'))"
                        title="Xóa dữ liệu">
                        <i class="bi bi-trash3 fs-5"></i>
                      </button>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <script th:inline="javascript">
      async function deleteGrade(id) {
        if (!confirm('Bạn có chắc muốn xóa điểm này?')) return;

        try {
          const response = await fetch(`/api/v1/student-grades/${id}`, {
            method: 'DELETE'
          });

          if (response.ok) {
            const row = document.getElementById(`row-${id}`);
            if (row) {
              row.classList.add('table-danger');
              setTimeout(() => row.remove(), 300);
            }
          } else {
            alert('Lỗi khi xóa dữ liệu.');
          }
        } catch (error) {
          console.error('Error:', error);
          alert('Có lỗi xảy ra, vui lòng thử lại.');
        }
      }
    </script>
  </th:block>
</body>
</html>
