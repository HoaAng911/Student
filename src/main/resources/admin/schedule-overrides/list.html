<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout :: layoutPage(pageTitle='Lịch đặt phòng ngoài lịch học', content=~{:: content})}">
<body>
<th:block th:fragment="content">
  <div class="container-fluid">

    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/admin}">Trang quản trị</a></li>
        <li class="breadcrumb-item active">Lịch đặt phòng</li>
      </ol>
    </nav>

    <!-- Alerts -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
      <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
      <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-header bg-white py-3 d-flex flex-wrap align-items-center justify-content-between gap-2">
        <h5 class="mb-0 fw-semibold">
          <i class="bi bi-calendar-check-fill me-2 text-primary"></i>Danh sách lịch đặt phòng
        </h5>
        <a th:href="@{/admin/schedule-overrides/add}" class="btn btn-primary btn-sm">
          <i class="bi bi-plus-lg me-1"></i> Thêm mới
        </a>
      </div>

      <div class="card-body">
        <!-- Search / Filter -->
        <form th:action="@{/admin/schedule-overrides}" method="get" class="row g-2 mb-3">
          <div class="col-12 col-md-3">
            <input type="text" name="keyword" th:value="${keyword}" class="form-control form-control-sm"
                   placeholder="Tìm theo mã, lý do..."/>
          </div>
          <div class="col-12 col-md-3">
            <select name="roomId" class="form-select form-select-sm">
              <option value="">-- Phòng --</option>
              <option th:each="r : ${rooms}"
                      th:value="${r.id}"
                      th:selected="${roomId != null and roomId == r.id}"
                      th:text="${r.roomCode + ' - ' + r.roomName}"></option>
            </select>
          </div>
          <div class="col-12 col-md-2">
            <select name="status" class="form-select form-select-sm">
              <option value="">-- Trạng thái --</option>
              <option value="PENDING"   th:selected="${status == 'PENDING'}">Chờ duyệt</option>
              <option value="APPROVED"  th:selected="${status == 'APPROVED'}">Đã duyệt</option>
              <option value="REJECTED"  th:selected="${status == 'REJECTED'}">Từ chối</option>
              <option value="CANCELLED" th:selected="${status == 'CANCELLED'}">Đã hủy</option>
            </select>
          </div>
          <div class="col-12 col-md-1">
            <select name="isActive" class="form-select form-select-sm">
              <option value="">-- HĐ --</option>
              <option value="true"  th:selected="${isActive != null and isActive == true}">Đang dùng</option>
              <option value="false" th:selected="${isActive != null and isActive == false}">Ngưng</option>
            </select>
          </div>
          <div class="col-auto">
            <button type="submit" class="btn btn-primary btn-sm">
              <i class="bi bi-search me-1"></i> Lọc
            </button>
          </div>
          <div class="col-auto">
            <a th:href="@{/admin/schedule-overrides}" class="btn btn-outline-secondary btn-sm">
              <i class="bi bi-arrow-counterclockwise me-1"></i> Làm mới
            </a>
          </div>
        </form>

        <!-- Table -->
        <div class="table-responsive">
          <table class="table table-hover table-bordered align-middle mb-0">
            <thead class="table-primary">
              <tr>
                <th class="text-center" style="width:50px;">#</th>
                <th>Mã đặt phòng</th>
                <th>Phòng</th>
                <th>Bắt đầu</th>
                <th>Kết thúc</th>
                <th>Lý do</th>
                <th class="text-center">Trạng thái</th>
                <th class="text-center">HĐ</th>
                <th class="text-center" style="width:120px;">Thao tác</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${#lists.isEmpty(overridePage.content)}">
                <td colspan="9" class="text-center text-muted py-4">
                  <i class="bi bi-inbox fs-4 d-block mb-2"></i>Chưa có dữ liệu.
                </td>
              </tr>
              <tr th:each="o, stat : ${overridePage.content}">
                <td class="text-center text-muted" th:text="${currentPage * 10 + stat.count}"></td>
                <td>
                  <span class="badge bg-primary-subtle text-primary fw-semibold" th:text="${o.overrideCode}"></span>
                </td>
                <td th:text="${(o.roomCode ?: '') + (o.roomName != null ? ' - ' + o.roomName : '')}"></td>
                <td>
                  <span th:if="${o.isBlocked}" class="badge bg-danger animate__animated animate__pulse animate__infinite" 
                        title="Phòng hiện đang bị khóa trong khoảng thời gian này!">
                    <i class="bi bi-lock-fill"></i> KHÓA
                  </span>
                </td>
                <td th:text="${#temporals.format(o.startTime, 'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${#temporals.format(o.endTime,   'dd/MM/yyyy HH:mm')}"></td>
                <td class="text-muted" style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"
                    th:text="${o.reason} ?: '-'" th:title="${o.reason}"></td>
                <td class="text-center">
                  <span class="badge"
                        th:classappend="${o.status == 'APPROVED'  ? 'bg-success-subtle text-success'  :
                                         o.status == 'REJECTED'  ? 'bg-danger-subtle text-danger'    :
                                         o.status == 'CANCELLED' ? 'bg-secondary-subtle text-secondary' :
                                         'bg-warning-subtle text-warning'}"
                        th:text="${o.status == 'APPROVED'  ? 'Đã duyệt'   :
                                   o.status == 'REJECTED'  ? 'Từ chối'    :
                                   o.status == 'CANCELLED' ? 'Đã hủy'     :
                                   'Chờ duyệt'}">
                  </span>
                </td>
                <td class="text-center">
                  <span class="badge"
                        th:classappend="${o.isActive} ? 'bg-success-subtle text-success' : 'bg-secondary-subtle text-secondary'"
                        th:text="${o.isActive} ? 'Đang dùng' : 'Ngưng'"></span>
                </td>
                <td class="text-center">
                  <a th:href="@{/admin/schedule-overrides/edit/{id}(id=${o.id})}"
                     class="btn btn-sm btn-outline-primary me-1">
                    <i class="bi bi-pencil"></i>
                  </a>
                  <form th:action="@{/admin/schedule-overrides/delete/{id}(id=${o.id})}" method="post" class="d-inline"
                        onsubmit="return confirm('Bạn có chắc muốn xóa lịch đặt phòng này?');">
                    <button type="submit" class="btn btn-sm btn-outline-danger">
                      <i class="bi bi-trash"></i>
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="d-flex justify-content-between align-items-center mt-3" th:if="${overridePage.totalElements > 0}">
          <small class="text-muted">
            Tổng <strong th:text="${overridePage.totalElements}"></strong> bản ghi
            | Trang <strong th:text="${currentPage + 1}"></strong> / <strong th:text="${totalPages}"></strong>
          </small>
          <nav th:if="${totalPages > 1}">
            <ul class="pagination pagination-sm mb-0">
              <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/schedule-overrides(keyword=${keyword}, roomId=${roomId}, status=${status}, isActive=${isActive}, page=${currentPage - 1}, size=10)}">
                  <i class="bi bi-chevron-left"></i>
                </a>
              </li>
              <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                  class="page-item" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/admin/schedule-overrides(keyword=${keyword}, roomId=${roomId}, status=${status}, isActive=${isActive}, page=${i}, size=10)}"
                   th:text="${i + 1}"></a>
              </li>
              <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/schedule-overrides(keyword=${keyword}, roomId=${roomId}, status=${status}, isActive=${isActive}, page=${currentPage + 1}, size=10)}">
                  <i class="bi bi-chevron-right"></i>
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </div>

  </div>
</th:block>
</body>
</html>
