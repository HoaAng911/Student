<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="app-sidebar" id="appSidebar" th:fragment="sidebar">

  <div class="sidebar-label">Quản trị</div>

  <a class="sidebar-link"
     th:href="@{/admin}"
     th:classappend="${currentMenu == 'home'} ? ' active' : ''"
     data-label="Trang chủ quản trị">
    <i class="bi bi-house-door-fill nav-icon"></i>
    <span class="nav-text">Trang chủ</span>
  </a>

  <a class="sidebar-link"
     th:href="@{/admin/room-types}"
     th:classappend="${currentMenu == 'room-types'} ? ' active' : ''"
     data-label="Loại phòng học">
    <i class="bi bi-building-fill nav-icon"></i>
    <span class="nav-text">Loại phòng học</span>
  </a>

  <a class="sidebar-link"
     th:href="@{/admin/rooms}"
     th:classappend="${currentMenu == 'rooms'} ? ' active' : ''"
     data-label="Phòng học">
    <i class="bi bi-door-open-fill nav-icon"></i>
    <span class="nav-text">Phòng học</span>
  </a>

  <!-- Phần mở rộng tương lai -->
  <div class="sidebar-label mt-2">Sắp ra mắt</div>

  <a class="sidebar-link text-secondary opacity-50"
     href="#" onclick="return false;" data-label="Lịch học (sắp ra mắt)">
    <i class="bi bi-calendar-week nav-icon"></i>
    <span class="nav-text">Lịch học</span>
  </a>

  <a class="sidebar-link text-secondary opacity-50"
     href="#" onclick="return false;" data-label="Giảng viên (sắp ra mắt)">
    <i class="bi bi-person-badge nav-icon"></i>
    <span class="nav-text">Giảng viên</span>
  </a>

  <a class="sidebar-link text-secondary opacity-50"
     href="#" onclick="return false;" data-label="Môn học (sắp ra mắt)">
    <i class="bi bi-book nav-icon"></i>
    <span class="nav-text">Môn học</span>
  </a>

</aside>
</body>
</html>
