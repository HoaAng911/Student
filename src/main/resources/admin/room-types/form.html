<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout :: layoutPage(pageTitle=${isEdit} ? 'Cập nhật loại phòng học' : 'Thêm loại phòng học', content=~{:: content})}">
<body>
<th:block th:fragment="content">
  <div class="container-fluid">

    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/admin}">Trang quản trị</a></li>
        <li class="breadcrumb-item"><a th:href="@{/admin/room-types}">Loại phòng học</a></li>
        <li class="breadcrumb-item active" th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'"></li>
      </ol>
    </nav>

    <div class="card shadow-sm border-0" style="max-width: 620px;">
      <div class="card-header bg-white py-3">
        <h5 class="mb-0 fw-semibold">
          <i class="bi bi-building-fill me-2 text-primary"></i>
          <span th:text="${isEdit} ? 'Cập nhật loại phòng học' : 'Thêm loại phòng học'"></span>
        </h5>
      </div>
      <div class="card-body">
        <form th:action="@{/admin/room-types/save}" th:object="${roomType}" method="post" novalidate>
          <input type="hidden" th:field="*{roomTypeId}" th:if="${isEdit}"/>
          <input type="hidden" name="isEdit" th:value="${isEdit}"/>

          <div class="mb-3">
            <label class="form-label fw-semibold">Mã loại phòng <span class="text-danger">*</span></label>
            <input type="text" th:field="*{roomTypeCode}"
                   th:class="'form-control' + (${#fields.hasErrors('roomTypeCode')} ? ' is-invalid' : '')"
                   maxlength="20" placeholder="VD: LT01"
                   th:readonly="${isEdit}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('roomTypeCode')}" th:errors="*{roomTypeCode}"></div>
            <div class="form-text" th:if="${isEdit}">Mã không thể thay đổi sau khi tạo.</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Tên loại phòng <span class="text-danger">*</span></label>
            <input type="text" th:field="*{roomTypeName}"
                   th:class="'form-control' + (${#fields.hasErrors('roomTypeName')} ? ' is-invalid' : '')"
                   maxlength="150" placeholder="VD: Phòng lý thuyết"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('roomTypeName')}" th:errors="*{roomTypeName}"></div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Mô tả</label>
            <textarea th:field="*{description}"
                      th:class="'form-control' + (${#fields.hasErrors('description')} ? ' is-invalid' : '')"
                      maxlength="255" rows="2" placeholder="Mô tả ngắn về loại phòng..."></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Sức chứa tối đa</label>
            <input type="number" th:field="*{maxCapacity}"
                   th:class="'form-control' + (${#fields.hasErrors('maxCapacity')} ? ' is-invalid' : '')"
                   min="0" max="9999" placeholder="VD: 50"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('maxCapacity')}" th:errors="*{maxCapacity}"></div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-save me-1"></i>
              <span th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'"></span>
            </button>
            <a th:href="@{/admin/room-types}" class="btn btn-outline-secondary">
              <i class="bi bi-x-lg me-1"></i> Hủy
            </a>
          </div>
        </form>
      </div>
    </div>

  </div>
</th:block>
</body>
</html>
