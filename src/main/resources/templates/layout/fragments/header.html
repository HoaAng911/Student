<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${title} + ' – Quản lý lịch học'">Hệ thống</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --sidebar-width: 264px;
      --sidebar-collapsed-width: 78px;
      --header-height: 72px;
      --primary-color: #5D5FEF;
      --primary-hover: #4a4cdb;
      --bg-body: #F5F7FA;
      --sidebar-bg: #ffffff;
      --sidebar-active-bg: rgba(93, 95, 239, 0.1);
      --sidebar-active-color: #5D5FEF;
      --sidebar-hover-bg: #f8fafc;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --radius-xl: 18px;
      --radius-lg: 12px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-card: 0 10px 15px -3px rgba(0,0,0,0.04), 0 4px 6px -2px rgba(0,0,0,0.02);
    }

    /* ===== RESET & BASE ===== */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      background: var(--bg-body);
      color: #334155;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== HEADER ===== */
    .app-header {
      height: var(--header-height);
      background: #ffffff;
      border-bottom: 1px solid #E2E8F0;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1030;
      display: flex;
      align-items: center;
      padding: 0 24px;
    }
    .app-header .brand {
      color: #1e293b;
      font-weight: 800;
      font-size: 1.1rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .app-header .brand i {
      font-size: 1.3rem;
      color: #fff;
      background: var(--primary-color);
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(93, 95, 239, 0.3);
    }
    .btn-toggle-sidebar {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      color: #64748b;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: var(--transition);
      font-size: .9rem;
    }
    .btn-toggle-sidebar:hover {
      background: #e2e8f0;
      color: var(--primary-color);
    }

    /* ===== SIDEBAR ===== */
    .app-sidebar {
      position: fixed;
      top: var(--header-height);
      left: 0;
      bottom: 0;
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      border-right: 1px solid #e2e8f0;
      transition: var(--transition);
      z-index: 1020;
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .app-sidebar.collapsed {
      width: var(--sidebar-collapsed-width);
      padding: 16px 8px;
    }

    .sidebar-label {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #94a3b8;
      padding: 20px 14px 10px;
      letter-spacing: 1.2px;
      transition: var(--transition);
    }
    .app-sidebar.collapsed .sidebar-label {
      opacity: 0;
      height: 0;
      padding: 0;
      overflow: hidden;
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 11px 14px;
      margin: 2px 0;
      border-radius: var(--radius-lg);
      text-decoration: none;
      color: #64748b;
      font-size: .875rem;
      font-weight: 500;
      transition: var(--transition);
      position: relative;
      white-space: nowrap;
    }
    .sidebar-link .nav-icon {
      font-size: 1.15rem;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }
    .sidebar-link:hover {
      background: var(--sidebar-hover-bg);
      color: #1e293b;
    }
    .sidebar-link.active {
      background: var(--sidebar-active-bg);
      color: var(--sidebar-active-color);
      font-weight: 700;
    }
    .sidebar-link.active .nav-icon {
      color: var(--sidebar-active-color);
    }
    .sidebar-link.active::before {
      content: '';
      position: absolute;
      right: 0; top: 15%; bottom: 15%;
      width: 4px;
      background: var(--sidebar-active-color);
      border-radius: 4px 0 0 4px;
    }

    /* Collapsed: hide text, show tooltip */
    .app-sidebar.collapsed .nav-text { display: none; }
    .app-sidebar.collapsed .sidebar-link {
      justify-content: center;
      padding: 12px;
    }
    .app-sidebar.collapsed .sidebar-link::after {
      content: attr(data-label);
      position: absolute;
      left: calc(var(--sidebar-collapsed-width) + 8px);
      background: #0f172a;
      color: #f1f5f9;
      font-size: .75rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 8px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-6px);
      transition: var(--transition);
      z-index: 9999;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .app-sidebar.collapsed .sidebar-link:hover::after {
      opacity: 1;
      transform: translateX(0);
    }

    /* ===== MAIN CONTENT ===== */
    .app-main {
      margin-left: var(--sidebar-width);
      margin-top: var(--header-height);
      min-height: calc(100vh - var(--header-height));
      transition: var(--transition);
      display: flex;
      flex-direction: column;
    }
    .app-main.sidebar-collapsed {
      margin-left: var(--sidebar-collapsed-width);
    }

    /* ===== MODERN CARD ===== */
    .card {
      border: 1px solid #e8ecf1;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      transition: var(--transition);
      background: #fff;
    }
    .card:hover {
      box-shadow: var(--shadow-card-hover);
    }
    .card-header {
      background: transparent;
      border-bottom: 1px solid #f1f5f9;
      padding: 20px 24px;
    }

    /* ===== TABLE ===== */
    .table thead th {
      background: #f8fafc;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      color: #64748b;
      font-weight: 700;
      border-top: none;
      padding: 14px 16px;
    }
    .table tbody td {
      padding: 14px 16px;
      vertical-align: middle;
      border-color: #f1f5f9;
      font-size: .875rem;
    }
    .table tbody tr {
      transition: background 0.2s ease;
    }
    .table-hover tbody tr:hover {
      background: #f8fafc;
    }

    /* ===== BUTTONS ===== */
    .btn {
      border-radius: 100px; /* Pill shape */
      padding: 10px 24px;
      font-weight: 600;
      transition: var(--transition);
    }
    .btn-primary {
      background: var(--primary-color);
      border: none;
      box-shadow: 0 4px 12px rgba(93, 95, 239, 0.25);
    }
    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(93, 95, 239, 0.35);
    }
    .btn-outline-primary {
      border-color: var(--primary-color);
      color: var(--primary-color);
    }
    .btn-outline-primary:hover {
      background: var(--primary-color);
      color: #fff;
    }

    /* ===== FORM CONTROLS ===== */
    .form-control:focus, .form-select:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    .form-control, .form-select {
      border-radius: 10px;
      border-color: #e2e8f0;
      padding: 10px 14px;
      font-size: .875rem;
    }

    /* ===== BREADCRUMB ===== */
    .breadcrumb {
      font-size: .85rem;
    }
    .breadcrumb-item a {
      color: #64748b;
      transition: color 0.2s;
    }
    .breadcrumb-item a:hover {
      color: #3b82f6;
    }
    .breadcrumb-item.active {
      color: #94a3b8;
    }

    /* ===== BADGES ===== */
    .badge {
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* ===== UTILITIES ===== */
    .transition-all { transition: var(--transition); }
    .hover-translate-y:hover { transform: translateY(-4px); }
    .hover-bg-light:hover { background: #f8fafc !important; }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .app-main > .flex-grow-1 > * {
      animation: fadeIn 0.35s ease-out;
    }

    /* ===== SCROLLBAR ===== */
    .app-sidebar::-webkit-scrollbar { width: 4px; }
    .app-sidebar::-webkit-scrollbar-track { background: transparent; }
    .app-sidebar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
    .app-sidebar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .app-sidebar { transform: translateX(-100%); }
      .app-sidebar.collapsed { transform: translateX(-100%); }
      .app-main { margin-left: 0 !important; }
    }
  </style>
</head>
<body>

<header class="app-header" th:fragment="header">
  <!-- Toggle button -->
  <button class="btn-toggle-sidebar me-3" id="sidebarToggle" title="Thu gọn / Mở rộng menu">
    <i class="bi bi-layout-sidebar-inset"></i>
  </button>
  <!-- Brand -->
  <a class="brand" th:href="@{/api}">
    <i class="bi bi-calendar3 flex-shrink-0"></i>
    <span class="brand-text">Hệ thống Quản lý Đào tạo</span>
  </a>
  <!-- Right actions -->
  <div class="ms-auto d-flex align-items-center gap-4">
    <!-- Search bar (optional in image) -->
    <form th:action="@{/api/students}" method="get" class="d-none d-lg-flex position-relative">
      <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
      <input type="text" name="keyword" class="form-control ps-5 bg-light border-0" placeholder="Tìm kiếm sinh viên..." style="width: 280px; border-radius: 12px;">
    </form>

    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-link text-muted p-2 position-relative">
            <i class="bi bi-bell fs-5"></i>
            <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle" style="margin-left: -8px; margin-top: 8px;"></span>
        </button>
        
        <div class="d-flex align-items-center gap-3 ps-3 border-start">
          <div class="text-end d-none d-md-block">
            <div class="fw-bold text-dark" style="font-size: .85rem;" th:text="${session.currentUser != null ? session.currentUser.username : 'Guest'}">User Name</div>
            <div class="text-muted" style="font-size: .75rem;" th:text="${session.currentUser != null ? session.currentUser.roles[0].name : 'Khách'}">Quản trị viên</div>
          </div>
          <div style="width: 42px; height: 42px; border-radius: 12px; background: #EEF2FF; border: 2px solid #fff; box-shadow: var(--shadow-sm); display: flex; align-items: center; justify-content: center; overflow: hidden;">
            <img th:if="${session.currentUser != null}" th:src="'https://ui-avatars.com/api/?name=' + ${session.currentUser.username} + '&background=5D5FEF&color=fff'" alt="avatar" />
            <i th:unless="${session.currentUser != null}" class="bi bi-person-fill text-primary"></i>
          </div>
        </div>
    </div>
  </div>
</header>

</body>
</html>
